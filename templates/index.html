<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid RAG</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:600px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        input[type="file"],
        input[type="text"]{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Hybrid RAG</h1>

<form action="/upload"
      method="post"
      enctype="multipart/form-data">

    <input
        type="file"
        name="file"
        required>

    <button type="submit">
        Upload Document
    </button>

</form>

<hr>

<form action="/ask"
      method="post">

    <input
        type="text"
        name="question"
        placeholder="Ask a question..."
        required>

    <button type="submit">
        Ask Question
    </button>

</form>

</div>

</body>

</html>
